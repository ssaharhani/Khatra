<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خطرة — Khatra</title>
<link rel="icon" type="image/png" href="leaf.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EAF2EC;--surface:#F4F9F6;--card:#FFFFFF;--card-h:#F0F7F3;
  --border:#BEDAD0;--border-l:#98C4B0;
  --sage:#3D7A60;--water:#3380A0;--gold:#A88820;
  --sage-bg:#E4F2EB;--water-bg:#E0EEF6;
  --text:#122018;--text2:#3A5040;--muted:#547060;--hint:#90B0A0;
  --red:#A83828;
  --fn-ar:'Cairo','Amiri',sans-serif;--fn-d:'Lora', 'Cairo' ,Georgia,serif;--fn-b:'DM Sans',system-ui,sans-serif;
  --r:9px;--rl:15px;--sw:222px;--hh:58px;--e:180ms ease}
[data-theme="dark"]{
  --bg:#0D1410;--surface:#131E18;--card:#192018;--card-h:#1E2820;
  --border:#243320;--border-l:#344528;
  --sage:#54A080;--water:#40A0C0;--gold:#C8A030;
  --sage-bg:#0E1C14;--water-bg:#0A1820;
  --text:#E4EEE8;--text2:#B0C8B8;--muted:#6A8878;--hint:#304030}
body{background:var(--bg);color:var(--text);font-family:var(--fn-b);font-size:14px;line-height:1.6;min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-l);border-radius:4px}
input,textarea,select,button{font-family:var(--fn-b)}button{cursor:pointer}

/* ── AUTH SCREEN ── */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:900;transition:opacity .4s}
#auth-screen.out{opacity:0;pointer-events:none}
.auth-logo{text-align:center;margin-bottom:2.5rem}
.auth-ar{font-family:var(--fn-ar);font-size:72px;color:var(--sage);display:block;line-height:1.05}
.auth-line{width:52px;height:2px;background:linear-gradient(90deg,var(--sage),var(--water));margin:10px auto}
.auth-en{font-family:var(--fn-d);font-size:12px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase;display:block}
.auth-tagline{font-family:var(--fn-d);font-size:14px;font-style:italic;color:var(--hint);margin-top:8px;display:block}
.google-btn{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:14px 28px;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;transition:box-shadow var(--e),border-color var(--e);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.google-btn:hover{border-color:var(--sage);box-shadow:0 3px 12px rgba(61,122,96,.12)}
.google-btn svg{flex-shrink:0}
.auth-hint{font-size:12px;color:var(--hint);margin-top:14px;font-family:var(--fn-d);font-style:italic}
.auth-err{font-size:13px;color:var(--red);margin-top:10px;min-height:20px;text-align:center}

/* ── LOCK SCREEN ── */
#lock-screen{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:800;gap:1.5rem;transition:opacity .4s}
#lock-screen.out{opacity:0;pointer-events:none}
.lock-user{display:flex;flex-direction:column;align-items:center;gap:8px}
.lock-avatar{width:56px;height:56px;border-radius:50%;border:2px solid var(--border)}
.lock-name{font-size:15px;color:var(--text);font-weight:500}
.lock-form{display:flex;flex-direction:column;align-items:center;gap:10px;width:270px}
.lock-pin{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:15px;padding:12px 16px;border-radius:var(--r);outline:none;text-align:center;letter-spacing:.12em;transition:border-color var(--e)}
.lock-pin:focus{border-color:var(--sage)}.lock-pin.err{border-color:var(--red);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lock-btn{background:var(--sage);color:#fff;border:none;padding:11px 38px;border-radius:var(--r);font-size:14px;font-weight:500;transition:opacity var(--e)}
.lock-btn:hover{opacity:.86}
.lock-skip{font-size:12px;color:var(--muted);background:transparent;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.lock-hint-txt{font-size:12px;color:var(--muted);min-height:18px;text-align:center}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
header{height:var(--hh);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.hlogo{display:flex;align-items:baseline;gap:8px;flex-shrink:0}
.hlogo-ar{font-family:var(--fn-ar);font-size:23px;color:var(--sage);line-height:1}
.hlogo-en{font-family:var(--fn-d);font-size:11px;letter-spacing:.26em;color:var(--muted);text-transform:uppercase;font-style:italic}
.hsep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.srchw{flex:1;max-width:340px;position:relative}
.srchw svg{position:absolute;inset-block:50%;inset-inline-start:11px;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.srch{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:13px;padding:8px 12px 8px 33px;border-radius:var(--r);outline:none;transition:border-color var(--e)}
[dir="rtl"] .srch{padding:8px 33px 8px 12px}
.srch:focus{border-color:var(--sage)}.srch::placeholder{color:var(--hint)}
.hacts{display:flex;align-items:center;gap:7px;margin-inline-start:auto}
.btnnew{background:var(--sage);color:#fff;border:none;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;transition:opacity var(--e)}
.btnnew:hover{opacity:.86}
.btnico{background:transparent;border:1px solid var(--border);color:var(--muted);width:33px;height:33px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;transition:color var(--e),border-color var(--e)}
.btnico:hover{color:var(--text);border-color:var(--border-l)}
.lang-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:0 11px;height:33px;border-radius:var(--r);font-size:12px;font-weight:500;transition:all var(--e)}
.lang-btn:hover{color:var(--text);border-color:var(--sage);background:var(--sage-bg)}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .4s}
.sync-dot.ok{background:var(--sage)}.sync-dot.busy{background:var(--gold)}.sync-dot.err{background:var(--red)}.sync-dot.off{background:var(--muted)}
.h-avatar{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);flex-shrink:0;cursor:pointer;display:none;object-fit:cover}

/* ── LAYOUT ── */
.bodyw{display:flex;flex:1;overflow:hidden}
aside{width:var(--sw);background:var(--surface);border-inline-end:1px solid var(--border);padding:13px 0 20px;overflow-y:auto;flex-shrink:0}
.ssect{padding:0 11px;margin-bottom:20px}
.slbl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:0 7px;margin-bottom:4px;display:block}
.sitem{display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:var(--r);color:var(--text2);font-size:13px;transition:background var(--e),color var(--e);border:none;background:transparent;width:100%;text-align:start}
.sitem:hover{background:var(--card);color:var(--text)}
.sitem.on{background:var(--sage-bg);color:var(--sage)}
.sitem .cnt{margin-inline-start:auto;font-size:11px;color:var(--muted);background:var(--border);padding:1px 6px;border-radius:20px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── CAPTURE ── */
.capbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;gap:9px;align-items:center;flex-shrink:0}
.cap-in{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;font-family:var(--fn-ar),var(--fn-b);padding:9px 13px;border-radius:var(--r);outline:none;transition:border-color var(--e),box-shadow var(--e)}
.cap-in:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(61,122,96,.1)}
.cap-in::placeholder{color:var(--hint);font-family:var(--fn-d);font-style:italic}
.cap-type{background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:13px;padding:9px 10px;border-radius:var(--r);outline:none;cursor:pointer;flex-shrink:0}
.cap-type option{background:var(--card)}
.capbtn{background:var(--sage);color:#fff;border:none;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:500;white-space:nowrap;transition:opacity var(--e);flex-shrink:0}
.capbtn:hover{opacity:.86}

/* ── MAIN ── */
main{flex:1;overflow-y:auto;background:var(--bg)}
.main-inner{padding:18px}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.mtitle{font-family:var(--fn-d);font-size:21px;font-weight:500;font-style:italic;color:var(--text)}
.mcounts{display:flex;align-items:center;gap:10px}
.msub{font-size:12px;color:var(--muted)}
.sortsel{background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:6px 10px;border-radius:var(--r);outline:none}
.sortsel option{background:var(--card)}

/* ── CARDS ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:11px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:15px 15px 15px 20px;cursor:pointer;transition:box-shadow var(--e),transform .15s;display:flex;flex-direction:column;gap:8px;animation:cIn .2s ease both;position:relative;overflow:hidden}
[dir="rtl"] .card{padding:15px 20px 15px 15px}
.card::before{content:'';position:absolute;inset-block:0;inset-inline-start:0;width:4px;border-start-start-radius:var(--rl);border-end-start-radius:var(--rl)}
.card:hover{box-shadow:0 3px 16px rgba(30,80,50,.1);transform:translateY(-1px)}
[data-theme="dark"] .card:hover{box-shadow:0 3px 12px rgba(0,0,0,.5)}
@keyframes cIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ctype-pill{font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0}
.cpin{font-size:12px;color:var(--gold);opacity:.8}
.ctitle{font-family:var(--fn-d);font-size:16px;font-weight:500;color:var(--text);line-height:1.35}
.cproj{font-size:12px;color:var(--water);display:flex;align-items:center;gap:5px}
.cbody{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cfoot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border);margin-top:auto}
.tpill{font-size:11px;padding:2px 8px;border-radius:20px}
.cdate{margin-inline-start:auto;font-size:11px;color:var(--hint)}
.clinks-ind{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;gap:12px;text-align:center;grid-column:1/-1}
.empty .e-ar{font-family:var(--fn-ar);font-size:48px;color:var(--hint)}
.empty .e-msg{font-family:var(--fn-d);font-size:18px;font-style:italic;color:var(--muted)}
.empty .e-sub{font-size:12px;color:var(--hint)}

/* ── PANEL ── */
.pov{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;display:flex;align-items:flex-start;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .24s}
[dir="rtl"] .pov{justify-content:flex-start}
[data-theme="dark"] .pov{background:rgba(0,0,0,.65)}
.pov.open{opacity:1;pointer-events:all}
.panel{width:545px;max-width:90vw;height:100vh;background:var(--surface);border-inline-start:1px solid var(--border);overflow-y:auto;transform:translateX(26px);transition:transform .24s;display:flex;flex-direction:column}
[dir="rtl"] .panel{transform:translateX(-26px)}
.pov.open .panel{transform:translateX(0)}
.phead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;background:var(--surface);z-index:1}
.ptitle-el{font-family:var(--fn-d);font-size:18px;font-weight:500;font-style:italic;color:var(--text)}
.pclose{background:transparent;border:none;color:var(--muted);padding:4px;border-radius:var(--r);display:flex;transition:color var(--e)}
.pclose:hover{color:var(--text)}
.pbody{padding:19px 20px;display:flex;flex-direction:column;gap:15px;flex:1}
.fg{display:flex;flex-direction:column;gap:5px}
.flbl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:500}
.fi,.ft,.fs{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;padding:9px 12px;border-radius:var(--r);outline:none;transition:border-color var(--e);width:100%}
.fi:focus,.ft:focus,.fs:focus{border-color:var(--sage)}
.fi::placeholder,.ft::placeholder{color:var(--hint)}
.ft{resize:vertical;min-height:155px;line-height:1.75;font-family:var(--fn-ar),var(--fn-b)}
.fi{font-family:var(--fn-ar),var(--fn-b)}.fs option{background:var(--card)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.tagw{display:flex;flex-wrap:wrap;gap:5px;padding:6px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);min-height:40px;align-items:center;cursor:text;transition:border-color var(--e)}
.tagw:focus-within{border-color:var(--sage)}
.tchip{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:12px}
.tchip .rm{cursor:pointer;opacity:.5;font-size:14px;line-height:1;transition:opacity var(--e)}.tchip .rm:hover{opacity:1}
.tagi{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;min-width:70px;flex:1}
.llist{display:flex;flex-direction:column;gap:6px}
.litem{display:flex;gap:6px;align-items:center}
.rmbtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:33px;height:33px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color var(--e),border-color var(--e)}
.rmbtn:hover{color:var(--red);border-color:var(--red)}
.addlnk{background:transparent;border:1px dashed var(--border);color:var(--muted);padding:7px 12px;border-radius:var(--r);font-size:13px;display:flex;align-items:center;gap:6px;transition:color var(--e),border-color var(--e)}
.addlnk:hover{color:var(--text);border-color:var(--border-l)}
.btoolbar{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:3px}
.tab{flex:1;padding:6px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-size:13px;transition:background var(--e),color var(--e)}
.tab.on{background:var(--surface);color:var(--text)}
.tcon{display:none;flex-direction:column}.tcon.on{display:flex}
.mdprev{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;min-height:155px;font-size:14px;line-height:1.8;color:var(--text2)}
.mdprev p{margin-bottom:.8em}.mdprev strong{color:var(--text)}.mdprev em{font-style:italic}.mdprev a{color:var(--water)}
.pin-toggle{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2)}
.pin-toggle input{width:15px;height:15px;cursor:pointer;accent-color:var(--sage)}
.pfoot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;background:var(--surface);position:sticky;bottom:0}
.btsave{flex:1;background:var(--sage);color:#fff;border:none;padding:10px;border-radius:var(--r);font-size:14px;font-weight:500;transition:opacity var(--e)}
.btsave:hover{opacity:.86}
.btsec{background:transparent;color:var(--muted);border:1px solid var(--border);padding:10px 14px;border-radius:var(--r);font-size:13px;transition:color var(--e),border-color var(--e)}
.btsec:hover{color:var(--text);border-color:var(--border-l)}
.btdel{background:transparent;color:var(--red);border:1px solid var(--border);padding:10px 14px;border-radius:var(--r);font-size:13px;transition:border-color var(--e)}
.btdel:hover{border-color:var(--red)}

/* ── FULL SCREEN ── */
#fs{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column}
#fs.open{display:flex}
.fsbar{display:flex;align-items:center;justify-content:space-between;padding:11px 22px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.fsbar-l{display:flex;align-items:center;gap:11px}
.fsinfo{font-size:12px;color:var(--muted);font-style:italic;font-family:var(--fn-d)}
.fsbody{flex:1;overflow-y:auto;padding:42px clamp(18px,8vw,120px);display:flex;flex-direction:column}
.fstitle{width:100%;background:transparent;border:none;outline:none;font-family:var(--fn-d);font-size:clamp(21px,4vw,36px);font-weight:500;font-style:italic;color:var(--text);line-height:1.2;margin-bottom:20px;padding:0}
.fstitle::placeholder{color:var(--hint)}
.fsta{flex:1;width:100%;background:transparent;border:none;outline:none;font-family:var(--fn-ar),var(--fn-b);font-size:16px;line-height:1.9;color:var(--text2);resize:none;min-height:380px}
.fsta::placeholder{color:var(--hint)}

/* ── PREVIEW ── */
.prev{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .24s}
.prev.open{opacity:1;pointer-events:all}
.prevbar{display:flex;align-items:center;justify-content:space-between;padding:12px 26px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.prevbar-l{display:flex;align-items:center;gap:12px}
.prevbar-title{font-size:13px;color:var(--muted)}
.prevcont{max-width:660px;width:100%;margin:0 auto;padding:42px 24px;flex:1;overflow-y:auto}
.prevmeta{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.pmi{display:flex;flex-direction:column;gap:3px}
.pmil{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.pmiv{font-size:14px;color:var(--text)}
.prevtitle{font-family:var(--fn-d);font-size:30px;font-weight:500;font-style:italic;color:var(--text);line-height:1.2;margin-bottom:22px}
.prevbody{font-size:15px;line-height:1.85;color:var(--text2)}
.prevbody p{margin-bottom:1em}.prevbody strong{color:var(--text);font-weight:500}.prevbody em{font-style:italic}.prevbody a{color:var(--water);text-decoration:none}.prevbody a:hover{text-decoration:underline}
.prevlinks{margin-top:24px;padding-top:18px;border-top:1px solid var(--border)}
.prevlinks-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.prevlinks-list{display:flex;flex-direction:column;gap:7px}
.prevlink{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);text-decoration:none;color:var(--text);font-size:13px;transition:border-color var(--e)}
.prevlink:hover{border-color:var(--sage)}
.prevlink-url{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── SETTINGS ── */
.sov{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .24s}
.sov.open{opacity:1;pointer-events:all}
.sov-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.sov-title{font-family:var(--fn-d);font-size:19px;font-weight:500;font-style:italic;color:var(--text)}
.sov-tabs{display:flex;gap:4px;padding:12px 20px 0;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}

  const ls=document.getElementById('lock-screen');

  document.getElementById('auth-screen').classList.add('out');
  setTimeout(()=>{document.getElementById('auth-screen').style.display='none'},420);
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('app').style.display='flex';

  const av=document.getElementById('h-avatar');
  if(user.photoURL){av.src=user.photoURL;av.style.display='block';av.title=user.displayName||'';}
  applyLang();
  setupFirestoreListeners(user.uid);
}

// FIRESTORE SYNC
// ═══════════════════════════════════════════════
function setupFirestoreListeners(uid){
  unsubs.forEach(u=>u());unsubs=[];setSyncDot('busy');
  // Settings / prefs
  const prefsUnsub=onSnapshot(doc(db,'users',uid,'meta','prefs'),(snap)=>{
    if(snap.exists()){
      const d=snap.data();
      if(d.types?.length)settings.types=d.types;
      if(d.projects)settings.projects=d.projects;
      sv(SS,settings);
      renderCapTypeSelect();renderProjSelect();renderSidebar();
    }
  },(e)=>{console.warn('prefs listener',e)});
  // Entries
  const entriesUnsub=onSnapshot(collection(db,'users',uid,'entries'),(snap)=>{
    snap.docChanges().forEach(ch=>{
      const data={id:ch.doc.id,...ch.doc.data()};
      if(ch.type==='added'||ch.type==='modified'){
        const idx=entries.findIndex(e=>e.id===data.id);
        if(idx>=0)entries[idx]=data;else entries.unshift(data);
      }else if(ch.type==='removed'){
        entries=entries.filter(e=>e.id!==ch.doc.id);
      }
    });
    renderSidebar();renderEntries();setSyncDot('ok');
  },(e)=>{console.warn('entries listener',e);setSyncDot('err')});
  unsubs=[prefsUnsub,entriesUnsub];
  // First run: migrate localStorage entries if Firestore empty
  setTimeout(async()=>{
    try{
      const snap=await getDocs(collection(db,'users',uid,'entries'));
      if(snap.empty){
        const localData=ld('kht_e')||[];
        if(localData.length>0){
          const batch=writeBatch(db);
          localData.filter(e=>e.id!=='__p__').forEach(e=>{batch.set(doc(db,'users',uid,'entries',e.id),e)});
          await batch.commit();
          toast('Local notes migrated to cloud ✓');
        }
        const ls=ld(SS);if(ls?.types||ls?.projects){await setDoc(doc(db,'users',uid,'meta','prefs'),{types:ls.types||DEFAULT_TYPES,projects:ls.projects||[]});}
      }
    }catch(e){console.warn('migration',e)}
  },500);
}

function renderSidebar(){
  const live=entries.filter(e=>e.id!=='__p__');
  document.getElementById('c-all').textContent=live.length;
  document.getElementById('c-pin').textContent=live.filter(e=>e.pinned).length;
  document.getElementById('type-filters').innerHTML=settings.types.map(tp=>{const cnt=live.filter(e=>e.type===tp.id).length;return`<button class="sitem${cfilter===`type:${tp.id}`?' on':''}" data-f="type:${tp.id}"><span class="sdot" style="background:${tp.color}"></span>${settings.lang==='ar'?tp.label_ar:tp.label_en}<span class="cnt">${cnt}</span></button>`}).join('');
  const pf=document.getElementById('proj-filters');
  if(settings.projects.length){document.getElementById('projects-sect').style.display='';pf.innerHTML=settings.projects.map(p=>{const cnt=live.filter(e=>e.project===p.id).length;return`<button class="sitem${cfilter===`proj:${p.id}`?' on':''}" data-f="proj:${p.id}"><span class="sdot" style="background:${p.color||'var(--water)'}"></span>${esc(p.name)}<span class="cnt">${cnt}</span></button>`}).join('');}
  else document.getElementById('projects-sect').style.display='none';
  const allTags={};live.forEach(e=>(e.tags||[]).forEach(tg=>{allTags[tg]=(allTags[tg]||0)+1}));
  const srtTags=Object.entries(allTags).sort((a,b)=>b[1]-a[1]);
  document.getElementById('tag-filters').innerHTML=srtTags.length?srtTags.map(([tg,n])=>{const c=tc(tg);return`<button class="sitem${cfilter===`tag:${tg}`?' on':''}" data-f="tag:${tg}"><span class="sdot" style="background:${c.tx}"></span>${esc(tg)}<span class="cnt">${n}</span></button>`}).join(''):`<span style="font-size:12px;color:var(--hint);padding:0 7px">${t('noTags')}</span>`;
  document.querySelectorAll('.sitem').forEach(el=>{
    el.addEventListener('click',()=>{
      cfilter=el.dataset.f;document.querySelectorAll('.sitem').forEach(x=>x.classList.remove('on'));el.classList.add('on');
      const lm={'all':t('all'),'pin':t('pinned')};let title=lm[cfilter];
      if(!title){if(cfilter.startsWith('type:')){const tp=typeById(cfilter.split(':')[1]);title=settings.lang==='ar'?tp.label_ar:tp.label_en}else if(cfilter.startsWith('proj:')){const p=projById(cfilter.split(':')[1]);title=p?p.name:cfilter}else if(cfilter.startsWith('tag:'))title='#'+cfilter.split(':')[1];else title=cfilter;}
      document.getElementById('vtitle').textContent=title;renderEntries();
    });
  });
}
function filtered(){
  let l=[...entries].filter(e=>e.id!=='__p__');
  if(cfilter==='pin')l=l.filter(e=>e.pinned);
  else if(cfilter!=='all'){if(cfilter.startsWith('type:'))l=l.filter(e=>e.type===cfilter.split(':')[1]);else if(cfilter.startsWith('proj:'))l=l.filter(e=>e.project===cfilter.split(':')[1]);else if(cfilter.startsWith('tag:'))l=l.filter(e=>(e.tags||[]).includes(cfilter.split(':')[1]));}
  if(csearch){const q=csearch.toLowerCase();l=l.filter(e=>(e.title||'').toLowerCase().includes(q)||(e.body||'').toLowerCase().includes(q)||(e.tags||[]).some(tg=>tg.toLowerCase().includes(q)));}
  const s=document.getElementById('sorter').value;
  if(s==='pinned')l.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.updatedAt.localeCompare(a.updatedAt));
  else if(s==='updated')l.sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt));
  else if(s==='created')l.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  else l.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  return l;
}
function renderEntries(){
  const g=document.getElementById('cgrid'),l=filtered();
  document.getElementById('vcnt').textContent=t('thoughtsCount')(l.length);

document.getElementById('add-proj-btn').addEventListener('click',()=>{document.getElementById('new-proj-form').style.display='block';document.getElementById('np-name').focus()});

// TAGS SETTINGS
function renderTagsSettings(){const c=document.getElementById('tags-sett-list');const allTags={};entries.filter(e=>e.id!=='__p__').forEach(e=>(e.tags||[]).forEach(tg=>{allTags[tg]=(allTags[tg]||0)+1}));const sorted=Object.entries(allTags).sort((a,b)=>b[1]-a[1]);if(!sorted.length){c.innerHTML=`<p style="font-size:13px;color:var(--hint);padding:8px 0">${t('noTags')}</p>`;return;}c.innerHTML=sorted.map(([tg,n])=>`<div class="tag-item"><span class="tag-item-name" id="tgname-${esc(tg)}">${esc(tg)}</span><span class="tag-item-count">${t('tagUsedIn')(n)}</span><button class="sett-edit-btn" onclick="startRenameTag('${esc(tg)}')">${t('rename')}</button><button class="sett-del-btn" onclick="deleteTag('${esc(tg)}')">${t('delete')}</button></div>`).join('');}
window.startRenameTag=tag=>{const nameEl=document.getElementById(`tgname-${tag}`);if(!nameEl)return;const inp=document.createElement('input');inp.className='tag-rename-input';inp.value=tag;nameEl.replaceWith(inp);inp.focus();inp.select();inp.addEventListener('keydown',e=>{if(e.key==='Enter'){const newTag=inp.value.trim();if(newTag&&newTag!==tag){const batch=currentUser?writeBatch(db):null;entries=entries.map(en=>{const updated={...en,tags:(en.tags||[]).map(x=>x===tag?newTag:x)};if(batch&&currentUser&&updated.id!=='__p__'&&en.tags?.includes(tag))batch.set(doc(db,'users',currentUser.uid,'entries',en.id),updated);return updated;});if(batch&&currentUser)batch.commit().catch(console.warn);renderTagsSettings();renderSidebar();renderEntries();toast(t('tagRenamed'));}}if(e.key==='Escape')renderTagsSettings();});};
window.deleteTag=tag=>{if(!confirm(t('deleteConfirm')))return;const batch=currentUser?writeBatch(db):null;entries=entries.map(e=>{const updated={...e,tags:(e.tags||[]).filter(x=>x!==tag)};if(batch&&currentUser&&e.id!=='__p__'&&e.tags?.includes(tag))batch.set(doc(db,'users',currentUser.uid,'entries',e.id),updated);return updated;});if(batch&&currentUser)batch.commit().catch(console.warn);renderTagsSettings();renderSidebar();renderEntries();toast(t('tagDeleted'));};

// MISC
document.getElementById('btn-theme').addEventListener('click',()=>setTheme(settings.theme==='dark'?'light':'dark'));
document.getElementById('lang-toggle-btn').addEventListener('click',()=>window.setLang(settings.lang==='ar'?'en':'ar'));
function toast(msg){const w=document.getElementById('toastw'),el=document.createElement('div');el.className='toast';el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),2200)}

// KEYBOARD
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(document.getElementById('fs').classList.contains('open')){closeFS(true);return}if(document.getElementById('sov').classList.contains('open')){closeSettings();return}if(document.getElementById('prev').classList.contains('open')){document.getElementById('prev').classList.remove('open');return}if(pov.classList.contains('open')){closePanel();}}
  if(e.ctrlKey&&e.key==='k'){e.preventDefault();document.getElementById('srch').focus()}
  if(e.ctrlKey&&e.key==='n'&&document.getElementById('app').style.display==='flex'){e.preventDefault();openPanel()}
  if(e.ctrlKey&&e.key==='s'&&pov.classList.contains('open')){e.preventDefault();saveEntry()}
  if(e.ctrlKey&&e.key==='Enter'&&document.getElementById('fs').classList.contains('open')){e.preventDefault();closeFS(true)}
});

// expose for onclick handlers
window.openPanel=openPanel;
window.closeSettings=closeSettings;
</script>
</body>
</html>
